<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          <span class="brand-mark">R</span>
          <span>{{ site.title }}</span>
        </a>
        <div class="nav-links">
          {% for item in site.nav %}
            <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
          {% endfor %}
        </div>
      </nav>
    </header>

    <main id="content" class="page-shell {% if page.url == '/' %}home-shell{% endif %}">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>Built from markdown.</span>
      <span class="footer-dot" aria-hidden="true"></span>
      <span id="today">Updated locally</span>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
